name: Build and publish

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build Python distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xponge-dist
          path: dist/*
          if-no-files-found: error

  publish-private-index:
    name: Publish to private index
    runs-on: ubuntu-latest
    needs: build-wheel

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: xponge-dist
          path: dist

      - name: Create release placeholder
        run: |
          mkdir -p release-assets
          printf "Release assets are published to the private package repository.\n" > release-assets/RELEASE_FILES_NOT_INCLUDED.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/RELEASE_FILES_NOT_INCLUDED.txt
          generate_release_notes: true

      - name: Upload to private repository
        env:
          PRIVATE_PYPI_URL: ${{ secrets.PRIVATE_PYPI_URL || vars.PRIVATE_PYPI_URL }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PRIVATE_PYPI_TOKEN }}
        run: |
          if [ -z "${PRIVATE_PYPI_URL}" ]; then
            echo "PRIVATE_PYPI_URL is not set. Please set GitHub Actions secret or variable PRIVATE_PYPI_URL"
            exit 1
          fi
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "PRIVATE_PYPI_TOKEN is not set. Please set GitHub Actions secret PRIVATE_PYPI_TOKEN"
            exit 1
          fi
          python -m pip install --upgrade twine
          python -m twine upload \
            --repository-url "${PRIVATE_PYPI_URL}" \
            --non-interactive \
            dist/*
